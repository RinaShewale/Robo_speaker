<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Themed Chat with Mic Only</title>

    <!-- Remix Icon CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="assis_style.css">

</head>

<body>

    <main id="main">
    
           <nav>
            <div class="logo">
                <img src="png/fashion.png" alt="">
            </div>
            <div class="ellips"></div>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="./feature.html">Features</a></li>
                <li><a href="./assistent.html">Assistant</a></li>
                <li><a href="./support.html">Support</a></li>
               <li><a href="about.html">About</a></li>
               <li class="sign-link"><a href="./form.html">Sign In</a></li>

            </ul>

            <div class="btn1">
                <a href="./form.html">
                    <button>sign in</button>
                </a>
            </div>

            <div class="menu-toggle">
                <i class="ri-menu-line"></i>
            </div>

        </nav>

        <div class="main-content">
            <section class="chat-container" aria-label="Assistant chat">
                <div class="animated-mic" aria-hidden="true">
                    <div class="mic-body">
                        <i class="ri-mic-line"></i>
                    </div>
                    <div class="mic-shadow" aria-hidden="true"></div>
                </div>

                <form class="input-container" onsubmit="event.preventDefault(); micAction();" role="search"
                    aria-label="Send message">
                    <label for="inputMessage" class="visually-hidden">Message</label>
                    <input type="text" id="inputMessage" placeholder="Type your message..." autocomplete="off">
                    <button class="mic-btn" type="button" aria-pressed="false" onclick="micAction()"
                        aria-label="Use microphone">
                        <i class="ri-mic-line"></i>
                    </button>
                </form>
            </section>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
